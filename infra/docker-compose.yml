version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: saas-optimizer-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: saas_optimizer
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: saas-optimizer-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: ../infra/docker/backend/Dockerfile
    container_name: saas-optimizer-backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/saas_optimizer
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      DEBUG: ${DEBUG:-True}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ../frontend
      dockerfile: ../infra/docker/frontend/Dockerfile
    container_name: saas-optimizer-frontend
    environment:
      API_URL: http://backend:8000
      API_V1_PREFIX: /api/v1
    ports:
      - "8501:8501"
    depends_on:
      - backend
    volumes:
      - ../frontend:/app
    command: streamlit run Home.py --server.port=8501 --server.address=0.0.0.0

  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    container_name: saas-optimizer-nginx
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro

  celery-worker:
    build:
      context: ../backend
      dockerfile: ../infra/docker/backend/Dockerfile
    container_name: saas-optimizer-celery-worker
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/saas_optimizer
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      - postgres
      - redis
    volumes:
      - ../backend:/app
    command: celery -A app.tasks worker --loglevel=info

volumes:
  postgres_data:
  redis_data:
